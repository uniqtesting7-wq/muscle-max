<svg xmlns="http://www.w3.org/2000/svg" width="500" height="400" viewBox="0 0 500 400">
  <rect width="500" height="400" fill="#111"/>
  <!-- Grid lines -->
  <line x1="0" y1="200" x2="500" y2="200" stroke="#E8141E" stroke-width="1" stroke-dasharray="8,6" opacity="0.3"/>
  <line x1="250" y1="0" x2="250" y2="400" stroke="#E8141E" stroke-width="1" stroke-dasharray="8,6" opacity="0.3"/>
  <!-- Border -->
  <rect x="12" y="12" width="476" height="376" fill="none" stroke="#E8141E" stroke-width="2" stroke-dasharray="12,8" opacity="0.5"/>
  <!-- Corner brackets -->
  <path d="M20,20 L50,20 M20,20 L20,50" stroke="#E8141E" stroke-width="3" fill="none"/>
  <path d="M480,20 L450,20 M480,20 L480,50" stroke="#E8141E" stroke-width="3" fill="none"/>
  <path d="M20,380 L50,380 M20,380 L20,350" stroke="#E8141E" stroke-width="3" fill="none"/>
  <path d="M480,380 L450,380 M480,380 L480,350" stroke="#E8141E" stroke-width="3" fill="none"/>
  <!-- Center icon: camera/image symbol -->
  <rect x="220" y="148" width="60" height="46" rx="6" fill="none" stroke="#E8141E" stroke-width="2" opacity="0.6"/>
  <circle cx="250" cy="171" r="12" fill="none" stroke="#E8141E" stroke-width="2" opacity="0.6"/>
  <rect x="244" y="142" width="12" height="8" rx="2" fill="#E8141E" opacity="0.6"/>
  <!-- Label -->
  <text x="250" y="186" fill="#E8141E" font-size="16" font-family="Arial,sans-serif" font-weight="bold" text-anchor="middle" letter-spacing="1">GALLERY - CARDIO AREA</text><text x="250" y="214" fill="#E8141E" font-size="16" font-family="Arial,sans-serif" font-weight="bold" text-anchor="middle" letter-spacing="1">500×400px</text>
  <!-- Watermark size -->
  <text x="484" y="388" fill="#E8141E" font-size="11" font-family="Arial" text-anchor="end" opacity="0.4">500×400</text>
</svg>