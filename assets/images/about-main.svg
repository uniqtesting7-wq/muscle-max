<svg xmlns="http://www.w3.org/2000/svg" width="700" height="500" viewBox="0 0 700 500">
  <rect width="700" height="500" fill="#1a1a1a"/>
  <!-- Grid lines -->
  <line x1="0" y1="250" x2="700" y2="250" stroke="#E8141E" stroke-width="1" stroke-dasharray="8,6" opacity="0.3"/>
  <line x1="350" y1="0" x2="350" y2="500" stroke="#E8141E" stroke-width="1" stroke-dasharray="8,6" opacity="0.3"/>
  <!-- Border -->
  <rect x="12" y="12" width="676" height="476" fill="none" stroke="#E8141E" stroke-width="2" stroke-dasharray="12,8" opacity="0.5"/>
  <!-- Corner brackets -->
  <path d="M20,20 L50,20 M20,20 L20,50" stroke="#E8141E" stroke-width="3" fill="none"/>
  <path d="M680,20 L650,20 M680,20 L680,50" stroke="#E8141E" stroke-width="3" fill="none"/>
  <path d="M20,480 L50,480 M20,480 L20,450" stroke="#E8141E" stroke-width="3" fill="none"/>
  <path d="M680,480 L650,480 M680,480 L680,450" stroke="#E8141E" stroke-width="3" fill="none"/>
  <!-- Center icon: camera/image symbol -->
  <rect x="320" y="198" width="60" height="46" rx="6" fill="none" stroke="#E8141E" stroke-width="2" opacity="0.6"/>
  <circle cx="350" cy="221" r="12" fill="none" stroke="#E8141E" stroke-width="2" opacity="0.6"/>
  <rect x="344" y="192" width="12" height="8" rx="2" fill="#E8141E" opacity="0.6"/>
  <!-- Label -->
  <text x="350" y="236" fill="#E8141E" font-size="16" font-family="Arial,sans-serif" font-weight="bold" text-anchor="middle" letter-spacing="1">ABOUT - MAIN</text><text x="350" y="264" fill="#E8141E" font-size="16" font-family="Arial,sans-serif" font-weight="bold" text-anchor="middle" letter-spacing="1">700×500px</text>
  <!-- Watermark size -->
  <text x="684" y="488" fill="#E8141E" font-size="11" font-family="Arial" text-anchor="end" opacity="0.4">700×500</text>
</svg>